services:
  # ── Vue 3 + Vite (Tauri 前端 dev server) ──────────────────────────────────
  # 注意：Tauri 桌面壳（src-tauri）需要在宿主机用 cargo tauri dev 启动
  # 此容器仅用于纯 Web 预览和开发调试
  endaxis-web:
    build:
      context: ./apps/endaxis-web
      target: dev
    container_name: endaxis-web
    ports:
      - "1420:1420"
    volumes:
      # Only mount src/ and config files — static assets (public/, dist/) live in the image
      - ./apps/endaxis-web/src:/app/src
      - ./apps/endaxis-web/public/gamedata.json:/app/public/gamedata.json
      - ./apps/endaxis-web/index.html:/app/index.html
      - ./apps/endaxis-web/vite.config.js:/app/vite.config.js
      - ./apps/endaxis-web/jsconfig.json:/app/jsconfig.json
      - ./apps/endaxis-web/tsconfig.json:/app/tsconfig.json
      - ./apps/endaxis-web/tsconfig.app.json:/app/tsconfig.app.json
      - ./apps/endaxis-web/tsconfig.node.json:/app/tsconfig.node.json
      - endaxis_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped

volumes:
  endaxis_node_modules:
